        - generic [ref=e355]:
          - generic [ref=e356]:
            - button "What does a SaaS design agency actually do?" [ref=e357] [cursor=pointer]:
              - heading "What does a SaaS design agency actually do?" [level=3] [ref=e359]:
                - strong [ref=e360]: What does a SaaS design agency actually do?
            - navigation "What does a SaaS design agency actually do?":
              - paragraph [ref=e365]: A SaaS design agency is a product design partner for software companies we run the research, design the flows, ship the UI, build the design system, and sit inside your sprints until the product is live. Think of us as a plug-in product design team, not a vendor you email files to.
          - generic [ref=e366]:
            - button "How much does it cost to hire a SaaS design agency in 2026?" [ref=e367] [cursor=pointer]:
              - heading "How much does it cost to hire a SaaS design agency in 2026?" [level=3] [ref=e369]
            - navigation "How much does it cost to hire a SaaS design agency in 2026?":
              - paragraph [ref=e374]: Expect $3,000–$15,000 a month for a serious SaaS design partner in 2026, or $15,000–$150,000 for a fixed redesign project. Atlas Studio runs on flat monthly plans $2,999 for Startup and $5,499 for Scale-ups so you skip the hourly-invoice anxiety and know exactly what your design capacity is every month.
          - generic [ref=e375]:
            - button "How long does a full SaaS redesign take?" [ref=e376] [cursor=pointer]:
              - heading "How long does a full SaaS redesign take?" [level=3] [ref=e378]
            - navigation "How long does a full SaaS redesign take?":
              - paragraph [ref=e383]: A focused SaaS redesign takes four to eight weeks with us; a full enterprise platform can run three to six months. The biggest variable isn't design it's how fast your team can review and make decisions. We keep momentum with weekly syncs and async Loom walkthroughs so feedback never stalls a sprint.
          - generic [ref=e384]:
            - button "How is a SaaS design agency different from a generalist design agency?" [ref=e385] [cursor=pointer]:
              - heading "How is a SaaS design agency different from a generalist design agency?" [level=3] [ref=e387]
            - navigation "How is a SaaS design agency different from a generalist design agency?":
              - paragraph [ref=e392]: "A generalist agency designs anything - websites, apps, brands, ads. A SaaS design agency lives inside product complexity: multi-step flows, data-heavy dashboards, permission layers, onboarding activation, retention patterns. We've shipped 60+ B2B SaaS products, so we won't burn two weeks learning what a workspace-and-seat model is."
          - generic [ref=e393]:
            - button "Can you help with onboarding flows and improving activation rates?" [ref=e394] [cursor=pointer]:
              - heading "Can you help with onboarding flows and improving activation rates?" [level=3] [ref=e396]
            - navigation "Can you help with onboarding flows and improving activation rates?":
              - paragraph [ref=e401]: Yes onboarding and activation are where most SaaS products leak trial users. We audit the current flow, identify the drop-off step, rebuild it around a 60-second aha moment, and A/B the new version. Clients typically see a 20–30% lift in activation within the first month after we ship.
          - generic [ref=e402]:
            - button "Do you work with pre-seed startups or only funded teams?" [ref=e403] [cursor=pointer]:
              - heading "Do you work with pre-seed startups or only funded teams?" [level=3] [ref=e405]
            - navigation "Do you work with pre-seed startups or only funded teams?":
              - paragraph [ref=e410]: Our sweet spot is Seed to Series B — teams with $500K–$25M raised, a real product, and real users. We do take on pre-seed founders occasionally when the idea is sharp and the founder is decisive, but if you're still validating the concept with no budget, a design sprint is a better first step than a full engagement.
          - generic [ref=e411]:
            - button "How do you measure success on a SaaS design project?" [ref=e412] [cursor=pointer]:
              - heading "How do you measure success on a SaaS design project?" [level=3] [ref=e414]
            - navigation "How do you measure success on a SaaS design project?":
              - paragraph [ref=e419]: Design work is only done when a business metric moves. We align on the north-star KPI at kickoff activation, conversion, retention, NPS, time-to-value instrument it before we ship, and track it for 30–60 days after. If the number didn't move, the work isn't finished.
          - generic [ref=e420]:
            - button "Can you design a SaaS product if we don't have engineers yet?" [ref=e421] [cursor=pointer]:
              - heading "Can you design a SaaS product if we don't have engineers yet?" [level=3] [ref=e423]
            - navigation "Can you design a SaaS product if we don't have engineers yet?":
              - paragraph [ref=e428]: Yes, and we'll save you from designing something that can't ship. We'll sketch flows, build clickable Figma prototypes, and translate screens into Webflow or a React MVP so you can demo to investors. When you do hire engineers, you'll hand them a ready-to-build spec, not a mood board.
          - generic [ref=e429]:
            - button "What deliverables do I get at the end of a SaaS design engagement?" [ref=e430] [cursor=pointer]:
              - heading "What deliverables do I get at the end of a SaaS design engagement?" [level=3] [ref=e432]: What deliverables do I get at the end of a SaaS design engagement?
            - navigation "What deliverables do I get at the end of a SaaS design engagement?":
              - paragraph [ref=e437]: "You walk away with: a production-ready Figma file, a design system with tokens and components, user-flow diagrams, annotated developer-handoff specs, a clickable prototype, accessibility notes, and any front-end code we built. All of it yours, all of it documented, no designer required to open the file."
          - generic [ref=e438]:
            - button "How is a pod-based engagement different from hiring a single designer?" [ref=e439] [cursor=pointer]:
              - heading "How is a pod-based engagement different from hiring a single designer?" [level=3] [ref=e441]: How is a pod-based engagement different from hiring a single designer?
            - navigation "How is a pod-based engagement different from hiring a single designer?":
              - paragraph [ref=e446]: One designer is one brain with one bandwidth ceiling. A pod gives you a designer, a researcher, a developer, and a lead who all share context so UI, UX, and development move in parallel instead of waiting on each other. Pod-based engagements typically ship 2–3x faster than a solo-designer model.
