        - heading "A Warm Welcome" [level=2] [ref=e45]
        - generic [ref=e46]:
          - paragraph [ref=e47]: We are genuinely glad you are here. At ORbix Studio, every project we take on is a collaboration we care deeply about — and these Terms exist not to create distance, but to give our work together the clearest, most respectful foundation possible.
          - paragraph [ref=e48]: These Terms of Service ('Terms') form a binding agreement between ORbix Studio ('we', 'us', 'our') and you, the Client. By proceeding with a project — whether through signing a proposal, making a payment, or giving us a go-ahead — you are confirming that you have read and agreed to these Terms.
        - paragraph [ref=e50]: Think of these Terms as our shared rulebook — designed so that both of us know exactly what to expect, and neither of us is ever left guessing.
      - generic [ref=e51]:
        - heading "1. The Services We Provide" [level=2] [ref=e52]
        - generic [ref=e53]:
          - paragraph [ref=e54]: ORbix Studio offers UI/UX design services alongside low-code, no-code, and custom code development. Every engagement is unique, which is why all services are defined specifically in your signed Project Proposal and Scope of Work ('SOW').
          - paragraph [ref=e55]: The SOW is the single source of truth for your project. If something is not listed there, it is not included — and that is intentional, so you always know exactly what you are getting and exactly what you are paying for.
