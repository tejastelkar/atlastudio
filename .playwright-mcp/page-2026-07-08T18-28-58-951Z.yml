        - paragraph [ref=e175]: 6.1 Response Time Commitment
        - paragraph [ref=e177]: We ask that you respond to all feedback requests, approval requests, and project communications within 5 business days. We understand that life gets busy — if you know you will be unavailable, simply let your Project Manager know in advance and we will plan around it.
        - paragraph [ref=e178]: 6.2 Project Hold Protocol
        - paragraph [ref=e180]: If we do not receive a response within 5 business days of a communication requiring your input, we will issue a formal Project Hold notice. Work will pause and the timeline will shift by the number of days the project remains on hold.
        - paragraph [ref=e181]: 6.3 Project Abandonment Clause
        - paragraph [ref=e183]:
          - text: "If we do not receive a response within 15 business days of a Project Hold notice being issued, the project will be considered abandoned. Upon abandonment:"
          - text: • All payments made to date are non-refundable.
          - text: • Orbix Studio retains ownership of all work product not yet delivered.
          - text: • The contract is terminated.
          - text: • If you wish to resume the project after abandonment, a new engagement and new deposit will be required.
        - paragraph [ref=e185]: We include this clause not as a threat, but as a fair protection for both sides. It ensures that our team's time and your investment are both treated with respect.
