          - generic [ref=e129]: Mobile responsiveness fix on an approved design
          - generic [ref=e131]: Add new mobile screens or app features
        - paragraph [ref=e132]: 3.3 Contradictory Feedback
        - paragraph [ref=e134]: "If feedback in one round contradicts feedback from a previous round — for example, 'make it bolder' followed by 'actually, make it more subtle' — the second direction counts as a new revision round, not a correction. We say this gently but clearly: changing direction uses a revision round."
        - paragraph [ref=e135]: 3.4 Additional Revision Rounds
        - paragraph [ref=e137]: Additional revision rounds beyond your included allowance are always available. They are billed at a pre- agreed rate and must be paid before the additional work begins. Your project proposal will state the rate clearly.
        - paragraph [ref=e138]: 3.5 Silent Approval — Keeping Things Moving
        - paragraph [ref=e140]: When we share a deliverable with you, we ask for your response within 5 business days. If we do not hear back within that window, the deliverable will be considered approved and the project will move to the next phase.
        - paragraph [ref=e142]: Once a deliverable is approved — either explicitly in writing, or via the 5-day silent approval window — it is locked. Returning to revise an approved deliverable requires a new Change Request.
