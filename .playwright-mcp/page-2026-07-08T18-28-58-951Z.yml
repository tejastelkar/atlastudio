        - paragraph [ref=e91]:
          - strong [ref=e92]: 2.3 Technical Handoff Documentation
        - paragraph [ref=e93]: Detailed handoff documentation — covering custom code, plugin configurations, and system architecture — is not a standard deliverable unless explicitly listed in your SOW. If you would like this, please let us know before the project begins. Every project includes a concise project summary as standard.
      - generic [ref=e94]:
        - heading "3. Revisions — How They Work" [level=2] [ref=e95]
        - paragraph [ref=e96]:
          - strong [ref=e97]: 3.1 What a Revision Round Means
        - paragraph [ref=e99]: Revisions mean changes to existing work within the approved scope. Anything new — additional features, new pages, new functionality, or a fundamentally different creative direction — is a Change Request and will be handled accordingly.
        - paragraph [ref=e101]: Please gather all feedback for a round before submitting. Drip-fed feedback over days counts as a new round — this protects the flow and quality of the work for both of us.
        - paragraph [ref=e102]: 3.2 What Counts as a Revision vs. a Change Reques
