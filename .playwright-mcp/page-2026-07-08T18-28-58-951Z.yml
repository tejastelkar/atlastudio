        - paragraph [ref=e145]: 4.1 The Brief Verification Step
        - paragraph [ref=e147]: A clear, accurate brief is the foundation of great work. Before we begin, we will review your requirements together to make sure everything is aligned, feasible, and agreed upon. You will be asked to formally sign off on the brief before work commences.
        - paragraph [ref=e148]: 4.2 A Note on AI-Generated Briefs
        - paragraph [ref=e150]:
          - text: We understand that many clients today use AI tools like ChatGPT to help articulate ideas. We welcome this — but ask that you personally review any AI-generated content before sharing it with us. AI documents can sometimes contain directions that are technically unworkable, contradictory, or broader than the project budget allows.
          - text: • All AI-generated briefs must be reviewed and endorsed by you as accurate and achievable before submission.
          - text: • We will flag content that is unclear or technically unworkable, and work through it with you before commencing.
        - paragraph [ref=e152]: ORbix Studio is not liable for delays, rework, or additional costs resulting from inaccurate or unverified requirements submitted by the Client — including those generated by AI tools.
