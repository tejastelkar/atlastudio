        - paragraph [ref=e158]: 5.2 Figma Access
        - paragraph [ref=e160]: We will share view-only Figma access throughout the project for review and feedback. Edit access to Figma files is not available at any stage. Final assets will be delivered in agreed formats upon full payment.
        - paragraph [ref=e161]: 5.3 GitHub & Code Repositories
        - paragraph [ref=e163]: Development happens within ORbix Studio's own repositories unless Client GitHub access is explicitly agreed in the SOW. Any mid-project request to move to a Client repository is a scope change.
        - paragraph [ref=e164]: 5.4 Hosting Environment
        - paragraph [ref=e166]: Unless your SOW specifies otherwise, we develop and stage projects in our own environments. Requests to switch to Client hosting mid-project will be treated as a scope change.
        - paragraph [ref=e167]: 5.5 Staging Approval Before Production
        - paragraph [ref=e169]: "No project will be deployed to a live production environment without: (a) your approval of the staging version in writing, and (b) authorisation from ORbix Studio's Project Manager. Staging approval is a required step — not optional."
        - paragraph [ref=e170]: 5.6 Transfer of Ownership
        - paragraph [ref=e172]: Upon receipt of full payment, ownership of agreed deliverables transfers to you. Partial payments do not grant partial ownership. Staging previews and Figma view access are shared in good faith and do not reduce or alter outstanding payment obligations.
      - generic [ref=e173]:
