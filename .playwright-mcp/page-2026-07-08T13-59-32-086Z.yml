        - generic [ref=f10e446]:
          - generic [ref=f10e447]:
            - button "What does a Webflow agency do that a freelancer can't?" [ref=f10e448] [cursor=pointer]:
              - heading "What does a Webflow agency do that a freelancer can't?" [level=3] [ref=f10e450]
            - navigation "What does a Webflow agency do that a freelancer can't?":
              - paragraph [ref=f10e455]: A Webflow agency brings a team of a designer, a developer, a copywriter, and a QA layer on one contract. A freelancer is great for a small site. An agency is what you need when the build includes CMS architecture, 50+ pages, custom interactions, SEO setup, and integrations with your stack. Different jobs, different tools.
          - generic [ref=f10e456]:
            - button "How much does a Webflow website cost from an agency in 2026?" [ref=f10e457] [cursor=pointer]:
              - heading "How much does a Webflow website cost from an agency in 2026?" [level=3] [ref=f10e459]
            - navigation "How much does a Webflow website cost from an agency in 2026?":
              - paragraph [ref=f10e464]: A marketing site from a quality Webflow agency sits at $5,000 - $15,000 in 2026. Larger CMS-driven sites run $15,000 - $50,000. Our Startup plan ships a conversion-ready Webflow site inside $2,999/month (100 hours) so you get design, build, and copy as one deliverable, not three invoices.
          - generic [ref=f10e465]:
            - button "How long does it take to design and build a Webflow site?" [ref=f10e466] [cursor=pointer]:
              - heading "How long does it take to design and build a Webflow site?" [level=3] [ref=f10e468]
            - navigation "How long does it take to design and build a Webflow site?":
              - paragraph [ref=f10e473]: A focused marketing site ships in two weeks with our Startup plan. A full brand site with 30+ pages and a CMS takes three to six weeks. Migrations from WordPress or Framer usually add one to two weeks depending on content volume. We hold weekly checkpoints so you always know which week you're in.
          - generic [ref=f10e474]:
            - button "Can you migrate our existing WordPress or Framer site to Webflow?" [ref=f10e475] [cursor=pointer]:
              - heading "Can you migrate our existing WordPress or Framer site to Webflow?" [level=3] [ref=f10e477]
            - navigation "Can you migrate our existing WordPress or Framer site to Webflow?":
              - paragraph [ref=f10e482]: "Yes we handle WordPress, Framer, Wix, Squarespace, and static-site migrations to Webflow regularly. The work is part rebuild, part import: we structure your CMS in Webflow, port your content, preserve your URLs, set up 301s, and re-submit the sitemap to Google so rankings don't drop."
          - generic [ref=f10e483]:
            - button "Is Webflow good for SEO, or do we lose rankings when we migrate?" [ref=f10e484] [cursor=pointer]:
              - heading "Is Webflow good for SEO, or do we lose rankings when we migrate?" [level=3] [ref=f10e486]
            - navigation "Is Webflow good for SEO, or do we lose rankings when we migrate?":
              - paragraph [ref=f10e491]: Webflow is strong for SEO fast hosting, clean semantic HTML, built-in schema, editable meta tags, and auto-optimized images. You only lose rankings if a migration is done lazily. Done right (URL-map preserved, 301 redirects in place, sitemap re-indexed, Core Web Vitals checked), most clients see rankings hold or climb within 30 days.
          - generic [ref=f10e492]:
            - button "What makes Atlas Studio different from other UI/UX design agencies?" [ref=f10e493] [cursor=pointer]:
              - heading "What makes Atlas Studio different from other UI/UX design agencies?" [level=3] [ref=f10e495]
            - navigation "What makes Atlas Studio different from other UI/UX design agencies?":
              - paragraph [ref=f10e500]: You do, always. We transfer the Webflow project to your workspace at launch, with admin access assigned to you. Your domain, your billing, your site. We don't hold projects hostage and we don't upcharge for transfers. If you ever leave Atlas Studio, your site leaves with you no ransom.
          - generic [ref=f10e501]:
            - button "Will my team be able to edit the site after launch?" [ref=f10e502] [cursor=pointer]:
              - heading "Will my team be able to edit the site after launch?" [level=3] [ref=f10e504]
            - navigation "Will my team be able to edit the site after launch?":
              - paragraph [ref=f10e509]: Yes. Webflow's Editor role lets marketers and founders update copy, images, CMS posts, and SEO fields without touching the Designer view. We leave you a short Loom walkthrough plus a written cheat-sheet, so a new hire can publish a blog post in fifteen minutes, not a support ticket.
          - generic [ref=f10e510]:
            - button "Can you build custom interactions, animations, and CMS structures in Webflow?" [ref=f10e511] [cursor=pointer]:
              - heading "Can you build custom interactions, animations, and CMS structures in Webflow?" [level=3] [ref=f10e513]
            - navigation "Can you build custom interactions, animations, and CMS structures in Webflow?":
              - paragraph [ref=f10e518]: Yes from scroll-triggered animations and multi-state hovers to nested CMS collections, multi-reference fields, and dynamic filters. We use GSAP, Lottie, and Webflow's native interactions as the toolkit. Where the platform hits a ceiling (complex auth, deep dashboards), we integrate Xano, Memberstack, or a custom API.
          - generic [ref=f10e519]:
            - button "What are the hidden costs of running a Webflow site?" [ref=f10e520] [cursor=pointer]:
              - heading "What are the hidden costs of running a Webflow site?" [level=3] [ref=f10e522]
            - navigation "What are the hidden costs of running a Webflow site?":
              - paragraph [ref=f10e527]: Budget for Webflow hosting ($15 - $235/month depending on CMS size), a workspace seat ($19 - $49/month per editor), and any third-party add-ons (Memberstack, Finsweet Attributes, Jetboost). Total stack usually lands at $40 - $300/month post-launch. No dev servers, no plugin maintenance, no monthly security patches, that's where the savings come back.
          - generic [ref=f10e528]:
            - button "Webflow vs Framer vs WordPress which should our startup pick?" [ref=f10e529] [cursor=pointer]:
              - heading "Webflow vs Framer vs WordPress which should our startup pick?" [level=3] [ref=f10e531]: Webflow vs Framer vs WordPress which should our startup pick?
            - navigation "Webflow vs Framer vs WordPress which should our startup pick?":
              - paragraph [ref=f10e536]: Pick Webflow when you need a CMS, custom interactions, and team-editable content (most SaaS sites). Pick Framer when you want fast, design-first marketing pages with tight motion (best for funded startups with heavy brand needs). Pick WordPress when SEO depth, plugins, or e-commerce complexity demand it. For B2B SaaS in 2026, Webflow is our default.
