            - generic [ref=e396]:
              - button "Who founded Atlas Studio and who runs it today?" [ref=e397] [cursor=pointer]:
                - heading "Who founded Atlas Studio and who runs it today?" [level=3] [ref=e399]
              - navigation "Who founded Atlas Studio and who runs it today?":
                - paragraph [ref=e404]: Atlas Studio was founded and is led by Shohanur Rahman, who built the agency around one belief that great products start with great user experience. The team is 30+ designers, engineers, and producers spread across New York, Riyadh, Dubai, and Dhaka, serving 80+ SaaS founders worldwide.
            - generic [ref=e405]:
              - button "What does Atlas Studio specialize in?" [ref=e406] [cursor=pointer]:
                - heading "What does Atlas Studio specialize in?" [level=3] [ref=e408]
              - navigation "What does Atlas Studio specialize in?":
                - paragraph [ref=e413]: We specialize in product design for B2B SaaS and AI teams - UI/UX, brand, motion, and full-stack development inside one team. Most clients are Seed-to-Series-B founders who want a complete product-and-marketing partner instead of stitching four separate vendors together. 150+ projects shipped to date.
            - generic [ref=e414]:
              - button "How long has Atlas Studio been in business?" [ref=e415] [cursor=pointer]:
                - heading "How long has Atlas Studio been in business?" [level=3] [ref=e417]
              - navigation "How long has Atlas Studio been in business?":
                - paragraph [ref=e422]: Orbix has been operating since 2023, with the LLC formally registered as a US entity. Over six years we have delivered 200+ design projects, helped clients raise a combined $10B+, and earned recognition on Behance (39 badges), Clutch (38+ reviews), and Top Worldwide Dribbble status.
            - generic [ref=e423]:
              - button "Where is Atlas Studio located?" [ref=e424] [cursor=pointer]:
                - heading "Where is Atlas Studio located?" [level=3] [ref=e426]
              - navigation "Where is Atlas Studio located?":
                - paragraph [ref=e431]: We are headquartered in New York with active offices in Riyadh, Dubai, and Dhaka. The team is 100% remote, which lets us cover US, EU, and GCC business hours and keep costs predictable for clients. No physical office overhead, no commute, no rigid timezone friction.
            - generic [ref=e432]:
              - button "How many designers and developers work at Atlas Studio?" [ref=e433] [cursor=pointer]:
                - heading "How many designers and developers work at Atlas Studio?" [level=3] [ref=e435]
              - navigation "How many designers and developers work at Atlas Studio?":
                - paragraph [ref=e440]: The team is 30+ creatives — senior designers, design leads, front-end and back-end developers, motion artists, illustrators, and project managers. Every engagement runs as a small pod (2–5 people) led by a senior designer, so you talk to the people doing the work, not account managers.
            - generic [ref=e441]:
              - button "What kind of clients does Atlas Studio work with?" [ref=e442] [cursor=pointer]:
                - heading "What kind of clients does Atlas Studio work with?" [level=3] [ref=e444]
              - navigation "What kind of clients does Atlas Studio work with?":
                - paragraph [ref=e449]: We work with funded B2B SaaS and AI teams (Seed–Series B), enterprise workflow products, and growing startups across fintech, healthcare, e-mobility, and logistics. Past clients include Circle K, RollUpLife, GiveHub, and Privilee. We do not take pre-seed solo projects or D2C e-commerce work.
            - generic [ref=e450]:
              - button "What is Atlas Studio's design and development process?" [ref=e451] [cursor=pointer]:
                - heading "What is Atlas Studio's design and development process?" [level=3] [ref=e453]
              - navigation "What is Atlas Studio's design and development process?":
                - paragraph [ref=e458]:
                  - text: "Three steps: Plan, Structure, Build. Plan - define the product goal and priority feature."
                  - text: Structure - map the user flow and key screens.
                  - text: Build - designers and developers work in parallel to ship production-ready experiences. Most product engagements move from kickoff to shipped product inside 2–6 weeks.
            - generic [ref=e459]:
              - button "What awards has Atlas Studio won?" [ref=e460] [cursor=pointer]:
                - heading "What awards has Atlas Studio won?" [level=3] [ref=e462]
              - navigation "What awards has Atlas Studio won?":
                - paragraph [ref=e467]: We have earned 39 Behance badges, the i.design Winner 2025 award for the GiveHub project, the Muzli Dashboard Showcase 2025 feature, and Top Worldwide ranking on Dribbble. 38+ reviews on Clutch, 50+ on GoodFirms, and 450+ reviews across Fiverr verified profiles.
            - generic [ref=e468]:
              - button "How is Atlas Studio different from other UI/UX agencies?" [ref=e469] [cursor=pointer]:
                - heading "How is Atlas Studio different from other UI/UX agencies?" [level=3] [ref=e471]: How is Atlas Studio different from other UI/UX agencies?
              - navigation "How is Atlas Studio different from other UI/UX agencies?":
                - paragraph [ref=e476]:
                  - text: Three measurable things.
                  - text: One - design and development share one team, so we ship in 2–6 weeks instead of 4 months.
                  - text: Two - AI production is bundled into the same retainer.
                  - text: Three - clients report 4x design capacity, 60% faster time-to-market, with proof published on Clutch.
            - generic [ref=e477]:
              - button "Is Atlas Studio a sustainable or eco-friendly design agency?" [ref=e478] [cursor=pointer]:
                - heading "Is Atlas Studio a sustainable or eco-friendly design agency?" [level=3] [ref=e480]: Is Atlas Studio a sustainable or eco-friendly design agency?
              - navigation "Is Atlas Studio a sustainable or eco-friendly design agency?":
                - paragraph [ref=e485]: Yes. We operate 100% remotely (zero commute emissions), run a paperless workflow on cloud-only documents, and host on Google Cloud and AWS both certified renewable-energy data centers. Low-impact operations are part of how we deliver high-volume creative work at scale, responsibly.
